<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro PHP Car</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 900px; margin-top: 40px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-custom { 
            background: linear-gradient(135deg, #ff0000 0%, #cdfa04 100%); 
            color: white; 
            padding: 25px; 
            border-radius: 15px 15px 0 0; 
            text-align: center;
        }
        .btn-primary { padding: 12px; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .form-label { font-weight: 600; color: #444; }
        .alert { border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-custom">
            <h2 class="mb-0">CADASTRO PHP Car</h2>
            <small>Sistema de Gerenciamento de Veículos</small>
        </div>
        
        <div class="card-body p-4">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Marca</label>
                        <input type="text" name="marca" class="form-control" placeholder="Ex: Toyota" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Modelo</label>
                        <input type="text" name="modelo" class="form-control" placeholder="Ex: Corolla" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Versão</label>
                        <input type="text" name="versao" class="form-control" placeholder="Ex: XEi 2.0" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Ano Fabricação</label>
                        <input type="text" name="ano_fab" class="form-control" placeholder="2023" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ano Modelo</label>
                        <input type="text" name="ano_mod" class="form-control" placeholder="2024" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Cor</label>
                        <input type="text" name="cor" class="form-control" placeholder="Branco" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Quilometragem</label>
                        <input type="text" name="km" class="form-control" placeholder="10.000" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Combustível</label>
                        <select name="combustivel" class="form-select" required>
                            <option value="" selected disabled>Selecione...</option>
                            {% for c in combustiveis %}
                            <option value="{{ c }}">{{ c }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Transmissão</label>
                        <select name="transmissao" class="form-select" required>
                            <option value="" selected disabled>Selecione...</option>
                            {% for t in transmissoes %}
                            <option value="{{ t }}">{{ t }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Final Placa</label>
                        <input type="text" name="placa" class="form-control" maxlength="1" placeholder="0" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Preço</label>
                        <input type="text" name="preco" class="form-control" placeholder="95.000" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Descrição Adicional</label>
                        <textarea name="descricao" class="form-control" rows="3" placeholder="Detalhes opcionais..." required></textarea>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary w-100 shadow">
                            🚀 CADASTRAR VEÍCULO NO BANCO
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    
    <p class="text-center text-muted mt-4">
        <small>&copy; 2026 PHP Car - Gerenciador de Banco de Dados</small>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
