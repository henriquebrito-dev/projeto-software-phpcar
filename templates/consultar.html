<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estoque | HG Services Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #060910;
            --card: #111827;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --green: #10b981;
        }

        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; padding: 50px 20px; }
        .main-card { background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Botão Voltar */
        .btn-voltar {
            text-decoration: none; color: #94a3b8; background: rgba(255,255,255,0.05);
            padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 0.8rem;
            display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-voltar:hover { background: var(--purple); color: white; }

        /* Estilo dos Inputs de Filtro */
        .filtro-input {
            background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important; border-radius: 10px;
        }

        .table { width: 100%; border-spacing: 0 10px; border-collapse: separate; }
        .table thead th { color: #94a3b8; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; padding: 10px 20px; }
        
        .table tbody tr { background: rgba(255, 255, 255, 0.03); transition: 0.3s; }
        .table tbody tr:hover { background: rgba(255, 255, 255, 0.07); transform: scale(1.01); }
        
        .table td { padding: 20px; vertical-align: middle; border: none; }
        .table td:first-child { border-radius: 12px 0 0 12px; border-left: 4px solid var(--purple); }
        .table td:last-child { border-radius: 0 12px 12px 0; }

        .brand { font-weight: 800; font-size: 1.1rem; display: block; }
        .color-detail { color: var(--cyan); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .price { color: var(--green); font-weight: 800; font-size: 1.2rem; }
        .badge-year { background: rgba(139, 92, 246, 0.1); color: var(--purple); padding: 5px 10px; border-radius: 8px; font-weight: 700; border: 1px solid rgba(139,92,246,0.2); }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="btn-voltar"><i class="fas fa-arrow-left"></i> VOLTAR AO PAINEL</a>

    <div class="main-card">
        <h2 style="margin-bottom: 30px; font-weight: 800;">Estoque de Veículos</h2>

        <form method="GET" action="/consultar" class="row g-2 mb-4">
            <div class="col-md-4">
                <input type="text" name="busca" class="form-control filtro-input" placeholder="Modelo ou Marca..." value="{{ request.args.get('busca', '') }}">
            </div>
            <div class="col-md-2">
                <input type="number" name="ano" class="form-control filtro-input" placeholder="Ano" value="{{ request.args.get('ano', '') }}">
            </div>
            <div class="col-md-2">
    <input type="text" name="preco_min" inputmode="numeric" class="form-control filtro-input" 
           placeholder="Preço Min" value="{{ request.args.get('preco_min', '') }}">
</div>
<div class="col-md-2">
    <input type="text" name="preco_max" inputmode="numeric" class="form-control filtro-input" 
           placeholder="Preço Max" value="{{ request.args.get('preco_max', '') }}">
</div>
            <div class="col-md-2">
                <button type="submit" class="btn w-100" style="background: var(--purple); color: white; font-weight: 800;">FILTRAR</button>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Veículo / Marca</th>
                        <th>Modelo / Versão</th>
                        <th>Ano (F/M)</th>
                        <th>KM</th>
                        <th>Investimento</th>
                    </tr>
                </thead>
                <tbody>
                    {% for v in veiculos %}
                    <tr>
                        <td>
                            <span class="brand">{{ v.marca }}</span>
                            <span class="color-detail">COR: {{ v.cor }}</span>
                        </td>
                        <td>
                            <span style="font-weight: 600;">{{ v.modelo }}</span><br>
                            <small style="color: #94a3b8;">{{ v.versao }}</small>
                        </td>
                        <td><span class="badge-year">{{ v.ano_fab }} / {{ v.ano_mod }}</span></td>
                        <td style="color: #94a3b8;">{{ v.km }} KM</td>
                        <td><span class="price">R$ {{ v.preco }}</span></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="5" class="text-center text-muted">Nenhum carro encontrado.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
