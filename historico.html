<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PHP Car | Histórico de Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; padding: 40px; }
        .glass-table {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        table { color: white !important; }
        .back-link { color: #38bdf8; text-decoration: none; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard</a>
        
        <div class="glass-table">
            <h2 class="mb-4 text-center"><i class="fa-solid fa-list-check me-2"></i> RELATÓRIO DE VENDAS</h2>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Placa</th>
                        <th>Valor (R$)</th>
                        <th>Vendedor</th>
                        <th>Data/Hora</th>
                    </tr>
                </thead>
                <tbody>
                    {% for venda in vendas %}
                    <tr>
                        <td>{{ venda.placa_veiculo }}</td>
                        <td>R$ {{ venda.valor_venda }}</td>
                        <td>{{ venda.vendedor }}</td>
                        <td>{{ venda.data_venda.strftime('%d/%m/%Y %H:%M') }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
